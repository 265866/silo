[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2025-0141: bincode 1.3.3 is pulled in only by Solana dev-dependencies used in tests; revisit by 2026-09-01 or when Solana crates migrate.
ignore = ["RUSTSEC-2025-0141"]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "GPL-3.0-or-later",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
