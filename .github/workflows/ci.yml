name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: msrv (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clipboard build deps
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked --all-targets

  dependency-policy:
    name: dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  release-workflow-installer-policy:
    name: release workflow installer policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check release installer patterns
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          workflow = pathlib.Path('.github/workflows/release.yml')
          text = workflow.read_text()
          patterns = [
              re.compile(r'curl[^\n|;]*\|[^\n]*(?:sh|bash)\b'),
              re.compile(r'sh\.rustup\.rs'),
          ]
          for pattern in patterns:
              match = pattern.search(text)
              if match:
                  line = text[:match.start()].count('\n') + 1
                  print(f'{workflow}:{line}: disallowed installer pattern: {match.group(0)}')
                  sys.exit(1)
          PY

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clipboard build deps
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install clipboard build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
